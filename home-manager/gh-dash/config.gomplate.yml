# gh-dash configuration
# Generated from gomplate template with data from repos.toml

pager:
  diff: delta

smartFilteringAtLaunch: true

repoPaths: {{ (datasource "data").repoPaths | data.ToJSONPretty "  " }}

keybindings:
  universal:
    - key: g
      name: lazygit
      command: cd {{ "{{" }} .RepoPath {{ "}}" }} && lazygit

  prs:
    - key: m
      name: quick merge (squash)
      command: gh pr merge --squash --auto --repo {{ "{{" }} .RepoName {{ "}}" }} {{ "{{" }} .PrNumber {{ "}}" }}

    - key: x
      name: request changes
      command: >
        gh pr review --repo {{ "{{" }} .RepoName {{ "}}" }} --request-changes
        --body "$(gum input --prompt='What needs changing: ')"
        {{ "{{" }} .PrNumber {{ "}}" }}

    - key: z
      name: open in zellij
      command: >
        REPO_NAME="{{ "{{" }} .RepoName {{ "}}" }}";
        PR_NUMBER="{{ "{{" }} .PrNumber {{ "}}" }}";
        REPO_PATH="{{ "{{" }} .RepoPath {{ "}}" }}";
        NEW_PATH=$(wt-ensure-repo "$REPO_NAME" "$PR_NUMBER" "$REPO_PATH") || { echo "ERROR: Failed to get worktree path"; exit 1; };
        if [ -n "$ZELLIJ" ]; then
          zellij action new-tab --cwd "$NEW_PATH" --name "PR $PR_NUMBER" || exit 1;
          sleep 0.2;
          zellij action write-chars "cd \"$NEW_PATH\" && clear && pwd && \${EDITOR:-nvim} .";
          zellij action write 13;
        else
          cd "$NEW_PATH" && ${EDITOR:-nvim} .;
        fi

defaults:
  prApproveComment: '<img width="815" height="808" alt="Image" src="https://github.com/user-attachments/assets/4cfd4325-1bfe-4cfe-8ae1-2151dc7f3662" />'

prSections:
  - title: "󰳐 author:@me"
    filters: "author:@me is:open archived:false sort:created-desc"

  - title: "󰳐 all requested reviews"
    filters: 'is:open sort:created-desc review-requested:@me{{ if (datasource "data").reposFilter }} {{ (datasource "data").reposFilter }}{{ end }}'

  - title: "󰳐 mention:@me"
    filters: "is:open mentions:@me sort:created-desc"

  - title: "󰳏 is:open"
    filters: "is:open"

  - title: "󰳐 all reviews"
    filters: 'is:open sort:created-desc{{ if (datasource "data").reposFilter }} {{ (datasource "data").reposFilter }}{{ end }}'
