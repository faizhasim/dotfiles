# Worktrunk Configuration
# External TOML file managed by Nix
# See: https://worktrunk.dev/config/

# Worktree path template
# Pattern: Sibling directories with repo name prefix
# Example: ~/dev/seek-jobs/customer-notification-system/noti-mailer/ (main repo)
#          ~/dev/seek-jobs/customer-notification-system/noti-mailer.feature-auth/ (branch)
worktree-path = "{{ repo_path }}/../{{ repo }}.{{ branch | sanitize }}"

# Commit configuration
[commit]
# Staging behavior: "none" = manual git add required
# Options: "all" (stage everything), "tracked" (only tracked files), "none"
stage = "none"

# Merge workflow configuration
[merge]
# Preserve individual commits (no squashing)
squash = false

# Commit any uncommitted changes before merging
commit = true

# Rebase onto target branch before merging
rebase = true

# Remove worktree after successful merge
remove = true

# Run project hooks during merge
verify = true

# Fast-forward merge (set false to always create merge commits)
ff = true
# Remove configuration
[remove]
# Delete branch after removing worktree
delete-branch = true

# List command defaults
[list]
# LLM branch summaries (requires [commit.generation] command)
summary = true

# Default columns (omit for worktrunk defaults)
columns = ["branch", "status", "ci", "path", "summary"]

# Dev server URL template for the url column
url = "http://localhost:{{ branch | hash_port }}"

# Don't show full details by default
full = false

# Don't include branches without worktrees
branches = false

# Don't include remote-only branches
remotes = false

# LLM commit message generation
[commit.generation]
# Keep OpenCode for worktrunk's merge/squash commit generation.
# Day-to-day commits use `omp commit` instead.
# OpenCode is installed via Homebrew and managed in home-manager/opencode.nix
# Command receives prompt via stdin and outputs commit message.
# Note: Using literal string with single quotes to avoid shell escaping issues.
command = "opencode run -m opencode-go/deepseek-v4-flash --variant low --pure | sed '/^```/d'"

# Per-user style guidance appended to the default templates
# (no custom template needed — defaults handle formatting)
template-append = """
- Use conventional commits: feat:, fix:, docs:, refactor:, test:, chore:
- Bullet points in body, keep brief
"""

# Copy local mise overrides and AI agent configs from primary worktree to new worktrees.
# Runs blocking before --execute commands start, ensuring agents have full context.
# Using [[pre-start]] pipeline blocks (preferred over table form for pre-* hooks).
[[pre-start]]
# Copy local mise overrides (.mise.toml, mise.local.toml)
mise-local = """
for file in .mise.toml mise.local.toml; do
  src="{{ primary_worktree_path }}/$file"
  dst="{{ worktree_path }}/$file"
  if [ -f "$src" ] && [ ! -e "$dst" ]; then
    cp "$src" "$dst"
  fi
done
"""

# Copy local AI agent configurations (.agent/, AGENTS.md)
ai-local = """
for item in .agent AGENTS.md; do
  src="{{ primary_worktree_path }}/$item"
  dst="{{ worktree_path }}/$item"
  if [ -e "$src" ] && [ ! -e "$dst" ]; then
    if [ -d "$src" ]; then
      cp -a "$src" "$dst"
    else
      cp "$src" "$dst"
    fi
  fi
done
"""

# Switch configuration
[switch]
# Auto-change directory after switching (requires shell integration)
cd = true

[switch.picker]
# Use delta for diff preview (matches our git config)
pager = "delta --paging=never"

# Aliases - run as `wt <name>`
[aliases]
# Quick switch to default branch (main/master)
main = "wt switch $(wt config state default-branch)"

# List with full details
lsf = "wt list --full"

# Switch to previous branch
back = "wt switch -"

# New branch
nb = "wt switch --create {{ args }}"

# Sync local configs (.mise.toml, mise.local.toml, .agent, AGENTS.md)
# from primary worktree to all existing worktrees that are missing them.
sync-local = """
wt step for-each -- '
for item in .mise.toml mise.local.toml .agent AGENTS.md; do
  src="{{ primary_worktree_path }}/$item"
  if [ -e "$src" ] && [ ! -e "$item" ]; then
    if [ -d "$src" ]; then
      cp -R "$src" "$item"
    else
      cp "$src" "$item"
    fi
    echo "Copied $item"
  fi
done
'
"""
