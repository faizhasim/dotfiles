name: Nix Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Check flake metadata
        run: nix flake metadata

      - name: Check formatting
        run: |
          nix fmt
          git diff --exit-code || (echo "❌ Formatting check failed. Run 'nix fmt' locally and commit changes." && exit 1)

      - name: Check formatter package (cross-platform)
        run: nix build .#formatter.x86_64-linux --no-link

      - name: Install statix
        run: nix profile install nixpkgs#statix

      - name: Run statix lint
        run: statix check
