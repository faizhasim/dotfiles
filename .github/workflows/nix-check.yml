name: Nix Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@33c9ab3ef95cd57c164d9d6eb1f9a46338538d41 # main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Check flake metadata
        run: nix flake metadata

      - name: Check Nix evaluation
        run: nix flake check
        continue-on-error: true

      - name: Check formatting
        run: |
          # Find all .nix files and format them
          find . -name "*.nix" -type f -not -path "./.git/*" | xargs nix fmt --
          # Check if any files were modified
          git diff --exit-code || (echo "❌ Formatting check failed. Run 'nix fmt' locally and commit changes." && exit 1)

      - name: Check formatter package (cross-platform)
        run: nix build .#formatter.x86_64-linux --no-link

      - name: Install statix
        run: nix profile install nixpkgs#statix

      - name: Run statix lint
        run: statix check

  build-darwin:
    if: (github.actor == 'dependabot[bot]' || github.actor == 'renovate[bot]') && github.event_name == 'pull_request'
    runs-on: [self-hosted, mac-mini, macmini01, aarch64-darwin]
    strategy:
      matrix:
        target: [M3419, macmini01]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build ${{ matrix.target }} system closure
        run: |
          export PATH="/run/current-system/sw/bin:$PATH"
          nix build .#darwinConfigurations.${{ matrix.target }}.config.system.build.toplevel --no-link